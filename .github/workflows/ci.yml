name: Java CI with maven and DockerHub

on:
  push:
    branches: [ "main" ] # triggers only when code is pushed to main
  pull_requst:
    branches: [ "main" ]  # triggers on PRs

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test using maven
        run: mvn clean package

      - name: Upload build artifact
        uses: actions/upload-artifact@4
        with:
          name: task-master-jar
          path: target/*.jar

    push-to-docker-hub:
      needs: build-and-test
      runs-on: ubuntu-latest
      if: github.event_name == 'push'
      steps:
        - uses: actions/checkout@4

        - name: Download build artifact
          uses: actions/download-artifact@4
          with:
            name: task-master-jar
            path: target/

        - name: Login to DockerHub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}      

        - name: build and push docker image
          uses: docker/build-push-action@v5
          with:
            context: .
            push: true
            tags: |
              ${{ secrets.DOCKERHUB_USERNAME }}/task-master:latest
              ${{ secrets.DOCKERHUB_USERNAME }}/task-master:${{ github.sha }}

    