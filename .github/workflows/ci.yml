name: Java CI with Maven and Docker Hub

on:
  push:
    branches: [ "main" ]
  pull_request:            # Fixed typo: added the 'e' in request
    branches: [ "main" ]

jobs:
  build_and_test:          # Changed hyphen to underscore for safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        run: mvn clean package

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: task-master-jar
          path: target/*.jar

  push_to_docker_hub:      # Changed hyphen to underscore
    needs: build_and_test 
    runs-on: ubuntu-latest
    if: github.event_name == 'push' 
    steps:
      - uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: task-master-jar
          path: target/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/task-master:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/task-master:${{ github.sha }}